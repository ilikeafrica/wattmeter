name: WattMeter
options:
  bundleIdPrefix: com.targetdisplay
  deploymentTarget:
    macOS: "12.0"
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: "1.1.1"
    CURRENT_PROJECT_VERSION: "3"
    PRODUCT_BUNDLE_IDENTIFIER: com.targetdisplay.wattmeter
    # 유니버설(Apple Silicon + Intel)
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
    # 공증 요건: 하드닝 런타임
    ENABLE_HARDENED_RUNTIME: YES
    # 서명: 자동(개발자 계정 팀)
    DEVELOPMENT_TEAM: 9ZL9DK8938
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    SWIFT_VERSION: "5.0"

targets:
  WattMeter:
    type: application
    platform: macOS
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: WattMeter
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSMinimumSystemVersion: "12.0"
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: "© 2026 song ho seong. MIT License."
    sources:
      - main.swift
      - path: Resources
        # .lproj / .xcassets 를 리소스로 포함
    scheme:
      testTargets: []
